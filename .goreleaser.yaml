# GoReleaser 配置 —— 构建多平台二进制并发布到 GitHub Release。
# 本仓库首次发布（v0.1.0）为手动构建；之后打 v* tag 时由
# .github/workflows/release.yml 自动调用本配置。
version: 2

project_name: webextract

before:
  hooks:
    - go mod tidy

builds:
  - id: webextract
    main: .
    binary: webextract
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: 'checksums.txt'

release:
  # 含 -rc / -pre / -beta 等后缀的 tag 自动标记为预发布，
  # 避免候选/测试版本顶替正式版的 latest 地位。
  prerelease: auto

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
